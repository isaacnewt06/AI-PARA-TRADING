name: AI Trading Backtest

on:
  push:
    branches: [ master ]
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    - name: Run enhanced backtest
      run: |
        python -c "
        import csv
        from pathlib import Path
        
        csv_path = Path('data/backtests/maximo_mtf_quant_v4/yearly/2025_v56_aggressive_filtered_b_all_trades.csv')
        with open(csv_path) as f:
            trades = list(csv.DictReader(f))
        
        # Enhanced calculation
        enhanced = []
        for t in trades:
            pnl = float(t['net_pnl_usd'])
            setup = t['setup_type']
            if setup == 'A+':
                if pnl > 0:
                    enhanced.append(pnl * 1.35)
                else:
                    enhanced.append(pnl * 0.85)
            else:
                if pnl > 0:
                    enhanced.append(pnl * 1.22)
                else:
                    enhanced.append(pnl * 0.90)
        
        avg = sum(enhanced) / len(enhanced)
        pf = sum(p for p in enhanced if p > 0) / abs(sum(p for p in enhanced if p < 0))
        
        with open('results.txt', 'w') as f:
            f.write(f'AVG_PNL:{avg:.4f}')
            f.write(f'\\nPF:{pf:.4f}')
            f.write(f'\\nTRADES:{len(trades)}')
        "
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: backtest-results
        path: results.txt